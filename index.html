<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>취향별 라면</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            }
            50% {
                box-shadow: 0 8px 35px rgba(0, 0, 0, 0.5);
            }
        }

        @keyframes shakeHorizontal {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-15px);
            }
            75% {
                transform: translateX(15px);
            }
        }

        body {
            background: linear-gradient(135deg, #2d5016, #3d6b1f);
            color: white;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: fadeInDown 0.8s ease-out;
        }

        .profile-section {
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #4a7c59, #6a9c79);
            clip-path: polygon(0 0, 85% 0, 100% 15%, 100% 100%, 15% 100%, 0 85%);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            animation: scaleIn 0.8s ease-out 0.2s both;
        }

        .ramen-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 50px;
        }

        .ramen-column {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .ramen-column:nth-child(1) .ramen-card:nth-child(1) {
            animation: slideInLeft 0.6s ease-out 0.3s both;
            background: linear-gradient(135deg, #cc0000, #ff3333);
        }

        .ramen-column:nth-child(1) .ramen-card:nth-child(2) {
            animation: slideInLeft 0.6s ease-out 0.5s both;
            background: linear-gradient(135deg, #ff69b4, #ffb3d9);
        }

        .ramen-column:nth-child(2) .ramen-card:nth-child(1) {
            animation: slideInRight 0.6s ease-out 0.3s both;
            background: linear-gradient(135deg, #8b4513, #cd853f);
        }

        .ramen-column:nth-child(2) .ramen-card:nth-child(2) {
            animation: slideInRight 0.6s ease-out 0.5s both;
            background: linear-gradient(135deg, #1a1a1a, #404040);
        }

        .ramen-card {
            padding: 25px;
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
            display: block;
            text-decoration: none;
            color: white;
            cursor: pointer;
        }

        .ramen-card:hover {
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            animation: shakeHorizontal 0.5s ease-in-out;
        }

        .ramen-card h2 {
            font-size: 24px;
            margin-bottom: 10px;
            transition: text-shadow 0.3s ease;
        }

        .ramen-card:hover h2 {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .ramen-card p {
            font-size: 14px;
            opacity: 0.9;
        }

        .footer {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, rgba(60, 94, 122, 0.3), rgba(90, 120, 150, 0.3));
            clip-path: polygon(0 10%, 0 100%, 100% 100%, 100% 10%);
            margin-top: 30px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.8s ease-out 0.7s both;
        }

        .footer p {
            font-size: 18px;
            color: #fff;
        }

        .side-card {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 150px;
            padding: 20px;
            background: linear-gradient(135deg, #ff6b9d, #ffa502);
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
            display: block;
            text-decoration: none;
            color: white;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideInRight 0.6s ease-out 0.8s both;
        }

        .side-card h3 {
            font-size: 16px;
            margin: 0;
            font-weight: bold;
        }

        .side-card:hover {
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            animation: shakeHorizontal 0.5s ease-in-out;
        }

        @media (max-width: 768px) {
            .side-card {
                display: none;
            }

            h1 {
                font-size: 32px;
                margin-bottom: 20px;
            }

            .profile-image {
                width: 100px;
                height: 100px;
            }

            .ramen-grid {
                grid-template-columns: 1fr;
                gap: 15px;
                margin-bottom: 30px;
            }

            .ramen-card {
                padding: 15px;
            }

            .ramen-card h2 {
                font-size: 18px;
            }

            .ramen-card p {
                font-size: 12px;
            }

            .footer {
                padding: 20px;
                margin-top: 20px;
            }

            .footer p {
                font-size: 14px;
            }

            body {
                padding: 20px 10px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 24px;
                margin-bottom: 15px;
            }

            .profile-image {
                width: 80px;
                height: 80px;
            }

            .profile-section {
                margin-bottom: 30px;
            }

            .ramen-grid {
                gap: 10px;
                margin-bottom: 20px;
            }

            .ramen-card {
                padding: 12px;
            }

            .ramen-card h2 {
                font-size: 16px;
                margin-bottom: 5px;
            }

            .ramen-card p {
                font-size: 11px;
            }

            .footer {
                padding: 15px;
            }

            .footer p {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <a href="https://vidkidz.tistory.com/36" class="side-card" target="_blank">
        <h3>슈의 라면가게<br>하러가기!</h3>
    </a>

    <div class="container">
        <h1>취향별 라면</h1>

        <div class="profile-section">
            <div class="profile-image"></div>
        </div>

        <div class="ramen-grid">
            <div class="ramen-column">
                <a href="https://brand.nongshim.com/shinramyun/main/index?searchProdCode=7" class="ramen-card" target="_blank">
                    <h2>🌶️ 신라면</h2>
                    <p>매콤한 맛의 클래식 라면</p>
                </a>
                <a href="https://paldofood.co.kr/product/noodle/12" class="ramen-card" target="_blank">
                    <h2>🥄 비빔면</h2>
                    <p>고소하고 얼큰한 비빔면</p>

            <div class="ramen-column">
                <a href="https://brand.nongshim.com/chapagetti/product/index?searchProdCode=34" class="ramen-card" target="_blank">

                    <p>극도로 매운 도전 라면</p>

        <div class="footer">

    </div>
</body>
</html>
